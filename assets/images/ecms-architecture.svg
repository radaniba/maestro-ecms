<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" aria-labelledby="t d">
  <title id="t">MAESTRO ECMS — layered platform architecture and data flows</title>
  <desc id="d">External systems connect into a central stack: experience, domain services, governance, persistence, and integration. Audit and evidence flow to a trust hub on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="45%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff5f7"/>
    </linearGradient>
    <linearGradient id="panelW" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>
    <linearGradient id="panelR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff0f3"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="panelG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="flowIn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d6234a" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#d6234a"/>
      <stop offset="100%" stop-color="#b91c3e" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="flowOut" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d6234a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#525252" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1a1a1a" flood-opacity="0.07"/>
    </filter>
    <filter id="shStrong" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#d6234a" flood-opacity="0.09"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L0,10 L10,5 z" fill="#d6234a"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L0,10 L10,5 z" fill="#737373"/>
    </marker>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e4e4e7" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <style><![CDATA[
      .fi { fill: none; stroke: url(#flowIn); stroke-width: 2.75; stroke-linecap: round; stroke-dasharray: 11 9; marker-end: url(#ar);
        animation: ecmsd 22s linear infinite; }
      .fo { fill: none; stroke: url(#flowOut); stroke-width: 2.25; stroke-linecap: round; stroke-dasharray: 9 11; marker-end: url(#ag);
        animation: ecmsd 28s linear infinite reverse; }
      .fb { fill: none; stroke: rgba(82,82,82,0.48); stroke-width: 2; stroke-linecap: round; stroke-dasharray: 8 10; marker-end: url(#ag);
        animation: ecmsd 18s linear infinite; }
      @keyframes ecmsd { to { stroke-dashoffset: -380; } }
      @media (prefers-reduced-motion: reduce) {
        .fi, .fo, .fb { animation: none; stroke-dasharray: none; }
      }
      .lbl { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    ]]></style>
  </defs>

  <rect width="1000" height="700" fill="url(#bg)"/>
  <rect width="1000" height="700" fill="url(#grid)" opacity="0.35"/>

  <!-- spine -->
  <line x1="500" y1="88" x2="500" y2="548" stroke="#d4d4d8" stroke-width="1.5" stroke-dasharray="6 10" opacity="0.85"/>

  <!-- flows (behind cards) -->
  <path class="fi" d="M 224 228 C 236 220, 246 210, 258 200"/>
  <path class="fi" d="M 224 298 C 248 285, 252 275, 258 268"/>
  <path class="fo" d="M 742 218 C 758 222, 768 232, 776 242"/>
  <path class="fo" d="M 742 288 C 760 288, 772 298, 776 308"/>
  <path class="fb" d="M 776 380 C 720 400, 620 418, 520 432"/>
  <path class="fb" d="M 520 448 C 620 434, 720 416, 776 396"/>

  <!-- Left hub -->
  <g filter="url(#sh)">
    <rect x="36" y="108" width="188" height="456" rx="20" fill="url(#panelW)" stroke="#d4d4d8" stroke-width="1"/>
    <rect x="36" y="108" width="188" height="46" rx="20" fill="#1b1b1b" opacity="0.92"/>
    <rect x="36" y="138" width="188" height="16" fill="#1b1b1b"/>
    <text class="lbl" x="130" y="140" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">External systems</text>
    <text class="lbl" x="130" y="182" text-anchor="middle" fill="#525252" font-size="10.5">CTMS · eTMF · QMS</text>
    <text class="lbl" x="130" y="200" text-anchor="middle" fill="#525252" font-size="10.5">IdP / SSO · HRIS</text>
    <text class="lbl" x="130" y="218" text-anchor="middle" fill="#525252" font-size="10.5">Webhooks · ESB</text>
    <rect x="52" y="238" width="156" height="38" rx="10" fill="#fff0f3" stroke="#d6234a" stroke-opacity="0.35" stroke-width="1.25"/>
    <text class="lbl" x="130" y="261" text-anchor="middle" fill="#9b1b40" font-size="10" font-weight="700">Inbound events</text>
    <rect x="52" y="286" width="156" height="38" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
    <text class="lbl" x="130" y="309" text-anchor="middle" fill="#404040" font-size="10" font-weight="600">Reference data</text>
    <rect x="52" y="334" width="156" height="38" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
    <text class="lbl" x="130" y="357" text-anchor="middle" fill="#404040" font-size="10" font-weight="600">File exchange</text>
    <text class="lbl" x="130" y="410" text-anchor="middle" fill="#a1a1aa" font-size="9" font-style="italic">Feeds the platform</text>
    <text class="lbl" x="130" y="428" text-anchor="middle" fill="#a1a1aa" font-size="9" font-style="italic">via API &amp; secure channels</text>
  </g>

  <!-- Right hub -->
  <g filter="url(#shStrong)">
    <rect x="776" y="108" width="188" height="456" rx="20" fill="url(#panelR)" stroke="#d6234a" stroke-opacity="0.2" stroke-width="1"/>
    <rect x="776" y="108" width="188" height="46" rx="20" fill="#d6234a"/>
    <rect x="776" y="138" width="188" height="16" fill="#d6234a"/>
    <text class="lbl" x="870" y="140" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Trust &amp; evidence</text>
    <text class="lbl" x="870" y="182" text-anchor="middle" fill="#525252" font-size="10.5">Immutable audit trail</text>
    <text class="lbl" x="870" y="200" text-anchor="middle" fill="#525252" font-size="10.5">SIEM / log streams</text>
    <text class="lbl" x="870" y="218" text-anchor="middle" fill="#525252" font-size="10.5">Retention · e-discovery</text>
    <rect x="792" y="238" width="156" height="38" rx="10" fill="#ffffff" stroke="#d6234a" stroke-opacity="0.3" stroke-width="1"/>
    <text class="lbl" x="870" y="261" text-anchor="middle" fill="#9b1b40" font-size="10" font-weight="700">Compliance tags</text>
    <rect x="792" y="286" width="156" height="38" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
    <text class="lbl" x="870" y="309" text-anchor="middle" fill="#404040" font-size="10" font-weight="600">Monitoring</text>
    <text class="lbl" x="870" y="400" text-anchor="middle" fill="#a1a1aa" font-size="9" font-style="italic">Continuous evidence</text>
    <text class="lbl" x="870" y="418" text-anchor="middle" fill="#a1a1aa" font-size="9" font-style="italic">for QA &amp; IT review</text>
  </g>

  <!-- Central stack -->
  <g filter="url(#sh)">
    <!-- 1 Experience -->
    <rect x="258" y="56" width="484" height="82" rx="16" fill="#ffffff" stroke="#d6234a" stroke-opacity="0.45" stroke-width="1.5"/>
    <circle cx="284" cy="97" r="18" fill="#d6234a"/>
    <text class="lbl" x="284" y="102" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">1</text>
    <text class="lbl" x="500" y="88" text-anchor="middle" fill="#171717" font-size="15" font-weight="700">Experience layer</text>
    <text class="lbl" x="500" y="112" text-anchor="middle" fill="#525252" font-size="11">Responsive web · API clients · guided workflows</text>
  </g>
  <path class="fi" d="M 500 138 L 500 152"/>

  <g filter="url(#sh)">
    <rect x="258" y="156" width="484" height="132" rx="16" fill="url(#panelW)" stroke="#d4d4d8" stroke-width="1"/>
    <circle cx="284" cy="210" r="18" fill="#404040"/>
    <text class="lbl" x="284" y="215" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">2</text>
    <text class="lbl" x="500" y="186" text-anchor="middle" fill="#171717" font-size="15" font-weight="700">ECMS domain services</text>
    <text class="lbl" x="500" y="206" text-anchor="middle" fill="#71717a" font-size="10">Documents · training · onboarding · validation · CAPA · tasks</text>
    <rect x="278" y="222" width="138" height="54" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
    <text class="lbl" x="347" y="246" text-anchor="middle" fill="#171717" font-size="10" font-weight="700">Content</text>
    <text class="lbl" x="347" y="262" text-anchor="middle" fill="#71717a" font-size="9">versions · access</text>
    <rect x="431" y="222" width="138" height="54" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
    <text class="lbl" x="500" y="246" text-anchor="middle" fill="#171717" font-size="10" font-weight="700">People</text>
    <text class="lbl" x="500" y="262" text-anchor="middle" fill="#71717a" font-size="9">skills · matrix</text>
    <rect x="584" y="222" width="138" height="54" rx="12" fill="#ffffff" stroke="#fce7f3" stroke-width="1"/>
    <text class="lbl" x="653" y="246" text-anchor="middle" fill="#171717" font-size="10" font-weight="700">Quality</text>
    <text class="lbl" x="653" y="262" text-anchor="middle" fill="#71717a" font-size="9">CSV · evidence</text>
  </g>
  <path class="fi" d="M 500 288 L 500 302"/>

  <g filter="url(#sh)">
    <rect x="258" y="304" width="484" height="58" rx="14" fill="url(#panelG)" stroke="#d6234a" stroke-opacity="0.35" stroke-width="1.25"/>
    <circle cx="284" cy="333" r="18" fill="#d6234a"/>
    <text class="lbl" x="284" y="338" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">3</text>
    <text class="lbl" x="500" y="328" text-anchor="middle" fill="#171717" font-size="13" font-weight="700">Governance &amp; security plane</text>
    <text class="lbl" x="500" y="348" text-anchor="middle" fill="#525252" font-size="10">Tenancy · RBAC · encryption · policy · PHI flags</text>
  </g>
  <path class="fi" d="M 500 362 L 500 376"/>

  <g filter="url(#sh)">
    <rect x="258" y="378" width="484" height="104" rx="16" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
    <circle cx="284" cy="418" r="18" fill="#525252"/>
    <text class="lbl" x="284" y="423" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">4</text>
    <text class="lbl" x="500" y="404" text-anchor="middle" fill="#171717" font-size="14" font-weight="700">Persistence &amp; content store</text>
    <rect x="278" y="418" width="138" height="50" rx="10" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="1"/>
    <text class="lbl" x="347" y="440" text-anchor="middle" fill="#171717" font-size="9.5" font-weight="700">Structured</text>
    <text class="lbl" x="347" y="456" text-anchor="middle" fill="#71717a" font-size="8.5">metadata · ACLs</text>
    <rect x="431" y="418" width="138" height="50" rx="10" fill="#fff5f5" stroke="#fecdd3" stroke-width="1"/>
    <text class="lbl" x="500" y="440" text-anchor="middle" fill="#171717" font-size="9.5" font-weight="700">Object store</text>
    <text class="lbl" x="500" y="456" text-anchor="middle" fill="#71717a" font-size="8.5">files · blobs</text>
    <rect x="584" y="418" width="138" height="50" rx="10" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="1"/>
    <text class="lbl" x="653" y="440" text-anchor="middle" fill="#171717" font-size="9.5" font-weight="700">Fast tier</text>
    <text class="lbl" x="653" y="456" text-anchor="middle" fill="#71717a" font-size="8.5">cache · queues</text>
  </g>
  <path class="fi" d="M 500 482 L 500 496"/>

  <g filter="url(#sh)">
    <rect x="258" y="498" width="484" height="78" rx="16" fill="#fafafa" stroke="#d6234a" stroke-opacity="0.22" stroke-width="1"/>
    <circle cx="284" cy="537" r="18" fill="#1b1b1b"/>
    <text class="lbl" x="284" y="542" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">5</text>
    <text class="lbl" x="500" y="526" text-anchor="middle" fill="#171717" font-size="14" font-weight="700">Integration &amp; automation fabric</text>
    <text class="lbl" x="500" y="548" text-anchor="middle" fill="#525252" font-size="10">REST API · bulk export · async jobs · event notifications</text>
  </g>

  <!-- Legend -->
  <g transform="translate(0,592)">
    <rect x="258" y="0" width="484" height="88" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" opacity="0.95"/>
    <text class="lbl" x="500" y="24" text-anchor="middle" fill="#71717a" font-size="10" font-weight="700" letter-spacing="0.06em">DATA FLOWS</text>
    <line x1="310" y1="48" x2="360" y2="48" stroke="url(#flowIn)" stroke-width="3" stroke-dasharray="10 8" stroke-linecap="round"/>
    <text class="lbl" x="372" y="52" fill="#525252" font-size="9.5">Inbound to core</text>
    <line x1="500" y1="48" x2="550" y2="48" stroke="url(#flowOut)" stroke-width="2.5" stroke-dasharray="8 10" stroke-linecap="round"/>
    <text class="lbl" x="562" y="52" fill="#525252" font-size="9.5">Out to evidence</text>
    <line x1="668" y1="48" x2="718" y2="48" stroke="rgba(82,82,82,0.5)" stroke-width="2" stroke-dasharray="6 8" stroke-linecap="round"/>
    <text class="lbl" x="726" y="52" fill="#525252" font-size="9.5">Bidirectional</text>
    <text class="lbl" x="500" y="76" text-anchor="middle" fill="#a1a1aa" font-size="9">Layered boundaries keep clinical, quality, and corporate content under one governed spine.</text>
  </g>
</svg>
