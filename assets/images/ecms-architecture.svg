<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 96 1200 560" role="img" aria-labelledby="bp-title bp-desc">
  <title id="bp-title">MAESTRO ECMS layered architecture</title>
  <desc id="bp-desc">Layered platform architecture with external systems on the left, six stacked platform layers in the middle, and evidence and deployment capabilities on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff6f8"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#e5e7eb" stroke-width="0.65" opacity="0.55"/>
    </pattern>
    <linearGradient id="tier1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbe4b6"/>
      <stop offset="100%" stop-color="#f7c96f"/>
    </linearGradient>
    <linearGradient id="tier2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde1e9"/>
      <stop offset="100%" stop-color="#f6b7c7"/>
    </linearGradient>
    <linearGradient id="tier3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd7e2"/>
      <stop offset="100%" stop-color="#ef8ca9"/>
    </linearGradient>
    <linearGradient id="tier4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f4d8ea"/>
      <stop offset="100%" stop-color="#d7a4d6"/>
    </linearGradient>
    <linearGradient id="tier5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d9e7ff"/>
      <stop offset="100%" stop-color="#a4c5f4"/>
    </linearGradient>
    <linearGradient id="tier6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d6eefb"/>
      <stop offset="100%" stop-color="#97cce9"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="35%" stop-color="#d6234a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#111827" flood-opacity="0.09"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#111827" flood-opacity="0.07"/>
    </filter>
    <style>
      .eyebrow { fill: #6b7280; font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; }
      .title { fill: #111827; font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 25px; font-weight: 800; }
      .subtitle { fill: #4b5563; font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 500; }
      .tierTitle { fill: #111827; font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.035em; }
      .tierText { fill: #374151; font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 11px; font-weight: 500; }
      .smallTitle { fill: #111827; font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 0.03em; }
      .smallText { fill: #4b5563; font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 10.5px; font-weight: 500; }
    </style>
  </defs>

  <rect width="1200" height="840" fill="url(#bg)"/>
  <rect width="1200" height="840" fill="url(#grid)"/>

  <g filter="url(#softShadow)">
    <rect x="304" y="124" width="592" height="500" rx="28" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="336" y="154" width="8" height="440" rx="4" fill="url(#accentLine)"/>

    <rect x="368" y="156" width="496" height="58" rx="18" fill="url(#tier1)"/>
    <text class="tierTitle" x="394" y="178">EXPERIENCE LAYER</text>
    <text class="tierText" x="394" y="194">
      <tspan x="394" dy="0">Responsive web UI, role-aware views, guided workflows,</tspan>
      <tspan x="394" dy="14">and operator productivity.</tspan>
    </text>
    <circle cx="826" cy="185" r="12" fill="#fff7e8" stroke="#e8b24f"/>
    <path d="M 820 185 h12 M 826 179 v12" stroke="#d97706" stroke-width="1.9" stroke-linecap="round"/>

    <rect x="368" y="226" width="496" height="62" rx="18" fill="url(#tier2)"/>
    <text class="tierTitle" x="394" y="250">DOMAIN MODULES</text>
    <text class="tierText" x="394" y="266">
      <tspan x="394" dy="0">Controlled documents, training, onboarding, validation,</tspan>
      <tspan x="394" dy="14">compliance, and tasks.</tspan>
    </text>
    <rect x="802" y="243" width="44" height="26" rx="13" fill="#ffffff" fill-opacity="0.66" stroke="#e5b4c2"/>
    <text x="824" y="261" text-anchor="middle" fill="#9b1b40" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">CORE</text>

    <rect x="368" y="302" width="496" height="62" rx="18" fill="url(#tier3)"/>
    <text class="tierTitle" x="394" y="326">WORKFLOW &amp; TASKS</text>
    <text class="tierText" x="394" y="342">
      <tspan x="394" dy="0">Approvals, routing, assignments, escalations, notifications,</tspan>
      <tspan x="394" dy="14">and operating checkpoints.</tspan>
    </text>
    <path d="M 818 320 h14 l8 12 -8 12 h-14 l-8 -12 z" fill="#ffffff" fill-opacity="0.68" stroke="#de8aa8"/>

    <rect x="368" y="378" width="496" height="62" rx="18" fill="url(#tier4)"/>
    <text class="tierTitle" x="394" y="402">SECURITY &amp; AUDIT</text>
    <text class="tierText" x="394" y="418">
      <tspan x="394" dy="0">RBAC, authentication controls, immutable logs,</tspan>
      <tspan x="394" dy="14">PHI-aware tagging, and traceability.</tspan>
    </text>
    <rect x="812" y="394" width="26" height="20" rx="4" fill="#ffffff" fill-opacity="0.72" stroke="#c78ec8"/>
    <path d="M 818 394 v-6 a7 7 0 0 1 14 0 v6" fill="none" stroke="#8b5aa1" stroke-width="1.6"/>

    <rect x="368" y="454" width="496" height="62" rx="18" fill="url(#tier5)"/>
    <text class="tierTitle" x="394" y="478">ASYNC &amp; SCALE</text>
    <text class="tierText" x="394" y="494">
      <tspan x="394" dy="0">Workers, exports, queues, background jobs,</tspan>
      <tspan x="394" dy="14">and resilience under reporting peaks.</tspan>
    </text>
    <circle cx="824" cy="485" r="12" fill="#ffffff" fill-opacity="0.74" stroke="#90b5eb"/>
    <path d="M 824 477 v16 M 816 485 h16" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/>

    <rect x="368" y="530" width="496" height="56" rx="18" fill="url(#tier6)"/>
    <text class="tierTitle" x="394" y="552">DEPLOYMENT FLEXIBILITY</text>
    <text class="tierText" x="394" y="567">
      <tspan x="394" dy="0">Canadian region affinity, dedicated instances, key controls,</tspan>
      <tspan x="394" dy="14">and cloud-native operations.</tspan>
    </text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="60" y="224" width="210" height="154" rx="20" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="86" y="249" width="46" height="46" rx="12" fill="#eef4ff"/>
    <circle cx="100" cy="272" r="5" fill="#2563eb"/>
    <circle cx="109" cy="262" r="5" fill="#2563eb"/>
    <circle cx="118" cy="272" r="5" fill="#2563eb"/>
    <line x1="100" y1="272" x2="109" y2="262" stroke="#2563eb" stroke-width="1.7"/>
    <line x1="109" y1="262" x2="118" y2="272" stroke="#2563eb" stroke-width="1.7"/>
    <line x1="100" y1="272" x2="118" y2="272" stroke="#2563eb" stroke-width="1.7"/>
    <text class="smallTitle" x="144" y="261">EXTERNAL</text>
    <text class="smallTitle" x="144" y="278">SYSTEMS</text>
    <text class="smallText" x="86" y="314">CTMS, eTMF, HRIS, SSO, and</text>
    <text class="smallText" x="86" y="331">inbound webhooks or file exchange.</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="902" y="190" width="228" height="146" rx="20" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="926" y="216" width="44" height="44" rx="12" fill="#fff1f3"/>
    <rect x="938" y="229" width="20" height="16" rx="3" fill="none" stroke="#d6234a" stroke-width="1.8"/>
    <path d="M 942 234 h12 M 942 240 h9" stroke="#d6234a" stroke-width="1.5" stroke-linecap="round"/>
    <text class="smallTitle" x="982" y="230">TRUST &amp;</text>
    <text class="smallTitle" x="982" y="247">EVIDENCE</text>
    <text class="smallText" x="926" y="284">Immutable audit trails, evidence</text>
    <text class="smallText" x="926" y="301">packs, and SIEM-aligned outputs.</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="902" y="400" width="228" height="148" rx="20" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="926" y="426" width="44" height="44" rx="12" fill="#eefbf5"/>
    <path d="M 936 451 h8 l6-12 6 20 6-12 h8" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="smallTitle" x="982" y="440">OPERATIONS</text>
    <text class="smallTitle" x="982" y="457">&amp; QA</text>
    <text class="smallText" x="926" y="492">Monitoring, quality review loops,</text>
    <text class="smallText" x="926" y="509">and deployment assurance signals.</text>
  </g>
</svg>
